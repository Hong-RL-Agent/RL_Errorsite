<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmallBiz CRM - 성장을 위한 똑똑한 고객 관리</title>
  <link rel="stylesheet" href="/css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar">
      <div class="logo">BIZ<span class="text-blue">CRM</span></div>
      <nav class="side-nav">
        <button id="nav-dashboard" class="active">대시보드</button>
        <button id="nav-customers">고객 목록</button>
        <button id="nav-reservations">예약 관리</button>
        <button id="nav-settings">설정</button>
      </nav>
      <div class="user-profile">
        <div class="avatar">JS</div>
        <div class="user-info">
          <p class="name">정수선 소장</p>
          <p class="role">Admin</p>
        </div>
      </div>
    </aside>

    <main class="content">
      <!-- Dashboard View -->
      <div id="dashboard-view" class="view-section">
        <div class="header">
          <h1>Business Overview</h1>
          <p class="text-muted">오늘의 비즈니스 현황을 한눈에 파악하세요.</p>
        </div>

        <div id="stats-grid" class="grid mt-5" data-bug-id="site068-bug02">
          <!-- 대시보드 위젯 -->
          <div class="stat-card">
            <p class="label">총 고객 수</p>
            <h2 id="total-customers">0</h2>
          </div>
          <div class="stat-card">
            <p class="label">오늘의 상담</p>
            <h2 id="today-consultations">0</h2>
          </div>
          <div class="stat-card">
            <p class="label">이달의 매출</p>
            <h2 id="monthly-revenue">₩0</h2>
          </div>
        </div>
      </div>

      <!-- Customers View -->
      <div id="customers-view" class="view-section" style="display:none;">
        <div class="header flex-between">
          <h1>Customer Management</h1>
          <button class="btn-blue">+ 신규 고객 등록</button>
        </div>

        <div class="toolbar mt-5">
          <div class="search-box">
            <input type="text" id="customer-search" placeholder="고객 성함 또는 전화번호 뒷자리...">
          </div>
        </div>

        <div class="table-wrapper mt-4">
          <table data-bug-id="site068-bug03">
            <thead>
              <tr>
                <th>고객명</th>
                <th>전화번호</th>
                <th>태그</th>
                <th>관리</th>
              </tr>
            </thead>
            <tbody id="customer-list">
              <!-- 고객 리스트 -->
            </tbody>
          </table>
        </div>
      </div>
    </main>

    <!-- 고객 상세/태그 편집 모달 -->
    <div id="detail-modal" class="modal">
      <div class="modal-content">
        <span class="close">&times;</span>
        <div id="modal-body">
          <!-- 상세 정보 -->
        </div>
        <div class="tag-edit-section mt-5">
          <label>고객 태그 수정</label>
          <div class="tag-input-group mt-2">
            <input type="text" id="new-tags" class="form-input" placeholder="콤마(,)로 구분하여 입력 (예: VIP, 단골)">
            <button id="save-tags-btn" class="btn-blue mt-3 w-full" data-bug-id="site068-bug01">태그 저장하기</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="toast" class="toast">메시지</div>

  <script src="/js/app.js"></script>
</body>
</html>
