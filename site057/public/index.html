<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClassNote Share - 지식의 선순환, 강의 노트를 나누세요</title>
  <link rel="stylesheet" href="/css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app-layout">
    <header class="navbar">
      <div class="logo">CLASS<span class="text-indigo">NOTE</span></div>
      <nav class="nav-links">
        <button id="nav-explore" class="active">노트 탐색</button>
        <button id="nav-upload">노트 업로드</button>
        <button id="nav-my">마이 페이지</button>
      </nav>
      <div class="user-status">
        <span class="badge">PRO USER</span>
      </div>
    </header>

    <main class="container">
      <!-- Explore View -->
      <div id="explore-view" class="view-section">
        <div class="hero">
          <h1>ACADEMIC EXCELLENCE</h1>
          <p>검증된 선배들의 필기 노트를 통해 학업 성취도를 높여보세요.</p>
        </div>

        <div class="toolbar mt-5">
          <div class="search-box">
            <input type="text" id="note-search" placeholder="과목명 또는 교수님 검색...">
          </div>
          <div class="filters">
            <select id="subject-filter" class="form-select">
              <option value="All">전체 과목</option>
              <option value="Economics">경제학</option>
              <option value="Computer Science">컴퓨터공학</option>
              <option value="General">교양</option>
            </select>
          </div>
        </div>

        <div id="note-grid" class="grid mt-4">
          <!-- 노트 카드 -->
        </div>
      </div>

      <!-- Upload View -->
      <div id="upload-view" class="view-section" style="display:none;">
        <h2 class="mb-4">새 강의 노트 공유하기</h2>
        <div class="upload-card p-5">
          <div class="form-group">
            <label>노트 제목</label>
            <input type="text" id="upload-title" class="form-input w-full" placeholder="예: 2024 데이터베이스 기말고사 정리">
          </div>
          <div class="form-group mt-3">
            <label>파일 선택 (.pdf, .docx 권장)</label>
            <input type="file" id="upload-file" class="form-input w-full">
          </div>
          <button id="submit-upload" class="btn-indigo w-full mt-4" data-bug-id="site057-bug02">업로드 하기</button>
        </div>
      </div>
    </main>

    <!-- 노트 상세 모달 -->
    <div id="note-modal" class="modal">
      <div class="modal-content">
        <span class="close">&times;</span>
        <div id="modal-body" data-bug-id="site057-bug03">
          <!-- 동적 로드 -->
        </div>
        
        <div class="comments-section mt-5">
          <h3>댓글 (<span id="comment-count">0</span>)</h3>
          <div id="comment-list" class="mt-2" data-bug-id="site057-bug01">
            <!-- 댓글 리스트 -->
          </div>
          <div class="comment-input-group mt-3">
            <input type="text" id="new-comment" class="form-input" placeholder="유익한 댓글을 남겨주세요.">
            <button id="submit-comment" class="btn-indigo">등록</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="toast" class="toast">메시지</div>

  <script src="/js/app.js"></script>
</body>
</html>
