<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BoardGame Cafe - 즐거운 보석 같은 시간</title>
  <link rel="stylesheet" href="/css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app-layout">
    <header class="navbar">
      <div class="logo">BOARDGAME<span class="text-yellow">CAFE</span></div>
      <nav class="nav-links">
        <button id="nav-games" class="active">게임 찾기</button>
        <button id="nav-tables">테이블 예약</button>
        <button id="nav-my">내 예약</button>
      </nav>
      <div class="user-badge">
        <span>Master Player</span>
      </div>
    </header>

    <main class="container">
      <!-- Games View -->
      <div id="games-view" class="view-section">
        <div class="hero">
          <h1>당신을 위한 완벽한 게임</h1>
          <p>오늘의 기분과 인원수에 맞는 최적의 보드게임을 추천해 드립니다.</p>
        </div>

        <div class="toolbar mt-5">
          <div class="search-box">
            <input type="text" id="game-search" placeholder="게임 이름으로 검색...">
          </div>
          <div class="filter-group">
            <button class="filter-btn active" data-cat="all">전체</button>
            <button class="filter-btn" data-cat="Strategy">전략</button>
            <button class="filter-btn" data-cat="Party">파티</button>
          </div>
        </div>

        <div id="game-grid" class="grid mt-4">
          <!-- 게임 카드 -->
        </div>
      </div>

      <!-- Tables View -->
      <div id="tables-view" class="view-section" style="display:none;">
        <h2 class="mb-4">실시간 테이블 현황</h2>
        <div id="table-grid" class="table-grid mt-4">
          <!-- 테이블 리스트 -->
        </div>
      </div>

      <!-- My Reservations View -->
      <div id="my-view" class="view-section" style="display:none;">
        <h2 class="mb-4">나의 예약 리스트</h2>
        <div id="res-list" class="list-wrapper">
          <!-- 예약 리스트 -->
        </div>
        <div class="admin-notice mt-5">
          <p class="text-sm text-muted">※ 최근 전체 예약 통계 확인 (보안 모니터링 중)</p>
          <div id="admin-data" class="mt-2" style="background:#f9f9f9; padding:15px; border-radius:10px; font-size:0.8rem;">
            <!-- 민감 데이터 노출 구역 (Bug 03) -->
          </div>
        </div>
      </div>
    </main>

    <!-- 예약 신청 모달 -->
    <div id="res-modal" class="modal">
      <div class="modal-content">
        <span class="close">&times;</span>
        <h2 class="mb-4" id="modal-title">테이블 예약하기</h2>
        <div class="res-form">
          <div class="form-group">
            <label>예약 시간</label>
            <select id="res-time" class="form-input">
              <option value="14:00">14:00</option>
              <option value="15:00">15:00</option>
              <option value="16:00">16:00</option>
              <option value="17:00">17:00</option>
            </select>
          </div>
          <div class="form-group mt-3">
            <label>연락처</label>
            <input type="text" id="res-contact" class="form-input" placeholder="010-0000-0000">
          </div>
          <button id="confirm-res-btn" class="btn-yellow w-full mt-4" data-bug-id="site047-bug01">예약 확정</button>
        </div>
      </div>
    </div>
  </div>

  <div id="toast" class="toast">메시지</div>

  <script src="/js/app.js"></script>
</body>
</html>
