<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TutorMatch - 최고의 선생님을 만나보세요</title>
  <link rel="stylesheet" href="/css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app-layout">
    <header class="navbar">
      <div class="logo">Tutor<span class="text-teal">Match</span></div>
      <div class="search-bar">
        <input type="text" id="tutor-search" placeholder="과목 또는 선생님 성함 검색...">
      </div>
      <div class="nav-links">
        <button id="nav-find" class="active">선생님 찾기</button>
        <button id="nav-my">내 상담 신청</button>
      </div>
    </header>

    <main class="content">
      <!-- Find Tutors View -->
      <div id="find-view" class="view-section">
        <aside class="filters">
          <div class="filter-group">
            <label>과목</label>
            <div class="chips mt-1">
              <button class="chip active" data-sub="all">전체</button>
              <button class="chip" data-sub="Math">수학</button>
              <button class="chip" data-sub="English">영어</button>
              <button class="chip" data-sub="Science">과학</button>
              <button class="chip" data-sub="Coding">코딩</button>
            </div>
          </div>
          <div class="filter-group mt-4">
            <label>정렬</label>
            <select id="sort-select" class="form-input mt-1" data-bug-id="site032-bug01">
              <option value="default">기본순</option>
              <option value="price_asc">가격 낮은순</option>
            </select>
          </div>
        </aside>

        <section class="main-panel">
          <div class="recommendations mb-5">
            <h3>✨ 오늘의 추천 선생님</h3>
            <div id="recommendation-row" class="row mt-3" data-bug-id="site032-bug02">
              <!-- 추천 선생님 카드 -->
            </div>
          </div>

          <div class="tutor-list">
            <div class="list-header">
              <h3>모든 선생님 <span id="tutor-count" class="text-sm text-muted">0명</span></h3>
            </div>
            <div id="tutor-grid" class="grid mt-3">
              <!-- 선생님 카드 -->
            </div>
          </div>
        </section>
      </div>

      <!-- My Consultations View -->
      <div id="my-view" class="view-section" style="display:none;">
        <h2 class="mb-4">나의 상담 신청 현황</h2>
        <div id="consult-list" class="consult-list">
          <!-- 상담 리스트 -->
        </div>
      </div>
    </main>

    <!-- 상담 신청 모달 -->
    <div id="consult-modal" class="modal">
      <div class="modal-content">
        <span class="close">&times;</span>
        <div class="modal-header">
          <h2 id="modal-tutor-name">상담 신청하기</h2>
          <p id="modal-tutor-sub" class="text-muted"></p>
        </div>
        <form id="consult-form" class="mt-4">
          <div class="form-group">
            <label>상담 희망 내용</label>
            <textarea id="consult-msg" class="form-input mt-1" rows="4" placeholder="학생의 현재 성적이나 보충하고 싶은 부분을 적어주세요." required></textarea>
          </div>
          <div class="form-footer mt-4">
            <button type="submit" class="btn-primary w-full" data-bug-id="site032-bug03">상담 신청서 제출하기</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <div id="toast" class="toast">메시지</div>

  <script src="/js/app.js"></script>
</body>
</html>
