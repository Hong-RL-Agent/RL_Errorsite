<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Concert Radar - 당신의 공연을 놓치지 마세요</title>
  <link rel="stylesheet" href="/css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Outfit:wght@300;400;600;800&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body class="dark-theme">
  <div class="app-layout">
    <header class="sidebar">
      <div class="logo">Concert<span class="neon-text">Radar</span></div>
      <nav class="nav-links">
        <button id="nav-home" class="active">🔥 인기 공연</button>
        <button id="nav-alerts">🔔 나의 알림</button>
        <button id="nav-favs">⭐ 관심 공연</button>
        <button id="nav-venues">🏟️ 공연장 정보</button>
      </nav>
      <div class="user-profile">
        <div class="user-info">
          <strong>MusicLover</strong>
          <p>Premium Member</p>
        </div>
      </div>
    </header>

    <main class="main-content">
      <div class="top-nav">
        <div class="search-box">
          <input type="text" id="concert-search" placeholder="아티스트 또는 공연 검색...">
        </div>
        <div class="filter-group">
          <button class="filter-tab active" data-genre="all">전체</button>
          <button class="filter-tab" data-genre="K-Pop">K-Pop</button>
          <button class="filter-tab" data-genre="Rock">Rock</button>
          <button class="filter-tab" data-genre="Pop">Pop</button>
        </div>
      </div>

      <!-- Home View -->
      <div id="home-view" class="view-section">
        <div class="section-header">
          <h2>지금 뜨는 공연</h2>
        </div>
        <div id="concert-grid" class="grid mt-4">
          <!-- 공연 카드 -->
        </div>
      </div>

      <!-- Alerts View -->
      <div id="alerts-view" class="view-section" style="display:none;">
        <h2 class="mb-4">티켓 오픈 알림 설정</h2>
        <div id="alert-list" class="grid">
          <!-- 알림 설정 리스트 -->
        </div>
      </div>
    </main>

    <!-- 공연 상세 모달 -->
    <div id="concert-modal" class="modal">
      <div class="modal-content">
        <span class="close">&times;</span>
        <div id="modal-body">
          <!-- 동적 로드 -->
        </div>
        <div class="modal-footer mt-4">
          <div class="action-buttons">
            <button id="check-seats-btn" class="btn-outline">실시간 잔여 좌석 확인</button>
            <button id="set-alert-btn" class="btn-neon" data-bug-id="site035-bug01">티켓 알림 등록</button>
          </div>
        </div>
      </div>
    </div>

    <!-- 알림 상세 모달 (IDOR 테스트) -->
    <div id="alert-modal" class="modal">
      <div class="modal-content">
        <span class="close">&times;</span>
        <div id="alert-detail-body" data-bug-id="site035-bug03">
          <!-- 동적 로드 -->
        </div>
      </div>
    </div>
  </div>

  <div id="toast" class="toast">메시지</div>

  <script src="/js/app.js"></script>
</body>
</html>
