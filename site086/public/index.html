<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FestivalFood — 축제 맛집 탐색</title>
  <meta name="description" content="FestivalFood: 축제 음식 부스를 탐색하고, 대기시간을 확인하고, 쿠폰을 사용하세요."/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/css/style.css"/>
</head>
<body>

<header class="header">
  <div class="hi">
    <a href="#" class="logo">
      <span class="logo-icon">🎪</span>
      <span class="logo-text">Festival<strong>Food</strong></span>
    </a>
    <nav class="gnav" id="gnav">
      <a href="#" class="nl active" data-view="booths">부스 탐색</a>
      <a href="#" class="nl" data-view="coupons">쿠폰</a>
      <a href="#" class="nl" data-view="favorites">즐겨찾기</a>
      <a href="#" class="nl" data-view="waits">대기시간</a>
    </nav>
    <div class="hright">
      <button class="hbtn" id="btn-refresh">↻</button>
      <div class="uchip"><span class="uav">F</span><span>user_festa</span></div>
      <button class="burger" id="burger">☰</button>
    </div>
  </div>
</header>

<main class="main">

  <!-- ══ VIEW: BOOTHS ══ -->
  <section class="view active" id="view-booths">
    <div class="vi">
      <!-- Hero -->
      <div class="hero">
        <div class="hero-body">
          <div class="hero-pill">🎉 실시간 축제 가이드</div>
          <h1 class="hero-h">지금 어디서 <em>뭐 먹지?</em></h1>
          <p class="hero-p">대기시간, 메뉴, 쿠폰까지 한번에 확인하세요.</p>
          <div class="hero-search">
            <input type="text" id="booth-search" placeholder="부스 이름, 메뉴 검색..." class="hsearch"/>
            <button class="btn-search" id="btn-booth-search">🔍</button>
          </div>
        </div>
        <div class="hero-foods" aria-hidden="true">🌶️🐙🍔🥞🍜🍦</div>
      </div>

      <!-- Toolbar -->
      <div class="toolbar">
        <div class="tf-group">
          <label>카테고리</label>
          <div class="chips" id="cat-chips">
            <button class="chip active" data-cat="all">전체</button>
          </div>
        </div>
        <div class="tf-group">
          <label>구역</label>
          <select class="tsel" id="zone-filter">
            <option value="all">전체</option>
            <option value="A구역">A구역</option>
            <option value="B구역">B구역</option>
            <option value="C구역">C구역</option>
          </select>
        </div>
        <div class="tf-group">
          <label>정렬</label>
          <select class="tsel" id="booth-sort">
            <option value="">기본</option>
            <option value="rating">평점순</option>
            <option value="wait_asc">대기 짧은순</option>
            <option value="wait_desc">대기 긴순</option>
          </select>
        </div>
        <span class="rcnt" id="booth-cnt"></span>
      </div>

      <div class="booth-grid" id="booth-grid"></div>
    </div>
  </section>

  <!-- ══ VIEW: COUPONS ══ -->
  <section class="view" id="view-coupons">
    <div class="vi">
      <div class="coupons-hdr">
        <h2 class="view-title">🎫 내 쿠폰</h2>
        <div class="bug03-panel">
          <span class="bug03-label">⚠️ [bug03 재현] 타 유저 쿠폰 사용 테스트</span>
          <div class="bug03-row">
            <input type="number" id="idor-coupon-id" placeholder="3" min="1" class="bug03-inp"/>
            <button class="btn-bug03" id="btn-coupon-idor">쿠폰 사용</button>
          </div>
          <div class="bug03-result" id="bug03-result"></div>
        </div>
      </div>
      <div class="coupon-list" id="coupon-list"></div>
    </div>
  </section>

  <!-- ══ VIEW: FAVORITES ══ -->
  <section class="view" id="view-favorites">
    <div class="vi">
      <h2 class="view-title">⭐ 즐겨찾기</h2>
      <div class="fav-grid" id="fav-grid"></div>
    </div>
  </section>

  <!-- ══ VIEW: WAITS ══ -->
  <section class="view" id="view-waits">
    <div class="vi">
      <div class="waits-hdr">
        <h2 class="view-title">⏱️ 실시간 대기시간</h2>
        <button class="btn-secondary btn-sm" id="btn-refresh-waits">↻ 새로고침</button>
      </div>
      <div class="stale-notice" id="stale-notice"></div>
      <div class="waits-list" id="waits-list"></div>
    </div>
  </section>

</main>

<!-- MODAL -->
<div class="modal-ov" id="modal-ov">
  <div class="modal-box">
    <button class="modal-x" id="modal-x">✕</button>
    <div class="modal-booth-hero" id="modal-booth-hero"></div>
    <div class="modal-tabs">
      <button class="mtab active" data-mt="menu">메뉴</button>
      <button class="mtab" data-mt="reviews">후기</button>
      <button class="mtab" data-mt="info">정보</button>
    </div>
    <div class="mpane active" id="mp-menu"></div>
    <div class="mpane hidden" id="mp-reviews">
      <div class="rlist" id="modal-rlist"></div>
      <div class="rform-wrap">
        <h4>후기 작성</h4>
        <form class="rform" id="review-form">
          <input type="hidden" id="rev-booth-id"/>
          <div class="rfrow">
            <input type="text" id="rev-author" placeholder="닉네임" maxlength="20" required/>
            <select id="rev-rating">
              <option value="5">⭐⭐⭐⭐⭐</option>
              <option value="4">⭐⭐⭐⭐</option>
              <option value="3">⭐⭐⭐</option>
            </select>
          </div>
          <textarea id="rev-content" placeholder="부스 후기를 작성해주세요." rows="3" maxlength="200"></textarea>
          <button type="submit" class="btn-primary btn-sm">후기 등록</button>
        </form>
        <div class="rev-msg" id="rev-msg"></div>
      </div>
    </div>
    <div class="mpane hidden" id="mp-info"></div>
  </div>
</div>

<div class="toast" id="toast"></div>
<script src="/js/app.js"></script>
</body>
</html>
