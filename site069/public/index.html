<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BookClub Meet - 함께 읽고, 깊게 나누는 시간</title>
  <link rel="stylesheet" href="/css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,700;1,400&family=Noto+Serif+KR:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app-layout">
    <header class="navbar">
      <div class="logo">BOOKCLUB<span class="text-oak">MEET</span></div>
      <nav class="nav-links">
        <button id="nav-discover" class="active">모임 탐색</button>
        <button id="nav-my-meetings">내 모임</button>
        <button id="nav-archive">서재 아카이브</button>
      </nav>
      <div class="user-action">
        <span class="user-status">Reader_A</span>
      </div>
    </header>

    <main class="container">
      <!-- Discover View -->
      <div id="discover-view" class="view-section">
        <div class="hero">
          <h1>ECHOES OF THOUGHT</h1>
          <p>종이 위의 활자가 살아 숨 쉬는 공간. 취향이 같은 이들과 함께 책의 깊이를 더해보세요.</p>
        </div>

        <div class="toolbar mt-5">
          <div class="search-box">
            <input type="text" id="meeting-search" placeholder="책 제목이나 작가로 검색...">
          </div>
          <div class="date-filter">
            <input type="date" id="date-picker">
          </div>
        </div>

        <div id="meeting-list" class="grid mt-4">
          <!-- 모임 리스트 로드 -->
        </div>
      </div>

      <!-- My Meetings View -->
      <div id="my-meetings-view" class="view-section" style="display:none;">
        <h2 class="mb-4">나의 독서 여정</h2>
        <div id="my-active-list" class="list-wrapper">
          <!-- 신청한 모임 목록 -->
        </div>
      </div>
    </main>

    <!-- 모임 상세 모달 -->
    <div id="meeting-modal" class="modal">
      <div class="modal-content">
        <span class="close">&times;</span>
        <div id="modal-body" data-bug-id="site069-bug03">
          <!-- 상세 내용 -->
        </div>
        <div class="discussion-section mt-5">
          <h3 class="section-subtitle">토론 발제문</h3>
          <div id="question-list" class="mt-3" data-bug-id="site069-bug02">
            <!-- 질문 리스트 -->
          </div>
        </div>
        <div class="modal-footer mt-5">
          <button id="action-btn" class="btn-oak w-full">참가 신청하기</button>
          <button id="cancel-btn" class="btn-outline w-full mt-2" style="display:none;" data-bug-id="site069-bug01">참가 취소하기</button>
        </div>
      </div>
    </div>
  </div>

  <div id="toast" class="toast">메시지</div>

  <script src="/js/app.js"></script>
</body>
</html>
