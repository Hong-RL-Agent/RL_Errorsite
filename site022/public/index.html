<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Parking Finder</title>
  <link rel="stylesheet" href="/css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="sidebar">
    <div class="logo">Parking<span class="text-yellow">Finder</span></div>
    <nav>
      <button id="nav-find" class="active">주차장 찾기</button>
      <button id="nav-my">내 예약</button>
      <button id="nav-info">이용 안내</button>
    </nav>
  </div>

  <main class="content">
    <header class="search-header">
      <div class="search-box">
        <input type="text" id="area-search" placeholder="지역명으로 검색 (예: 강남, 역삼)...">
        <button id="search-btn">검색</button>
      </div>
      <div class="filters">
        <button class="filter-chip active" data-sort="default">기본순</button>
        <button class="filter-chip" data-sort="price_asc">최저가순</button>
      </div>
    </header>

    <!-- Map/Finder View -->
    <div id="find-view" class="view-section">
      <div class="map-placeholder">
        <p>🗺️ 지도 데이터를 불러오는 중...</p>
        <p class="text-xs text-muted mt-2">(실제 지도는 API 키가 필요하므로 리스트 뷰로 대체합니다)</p>
      </div>
      <div class="lot-list-container">
        <div class="section-title">
          <h3>주변 추천 주차장</h3>
          <span class="count-tag" id="lot-count">0개 발견</span>
        </div>
        <div id="lot-grid" class="grid mt-2">
          <!-- 주차장 카드 -->
        </div>
      </div>
    </div>

    <!-- My Reservations View -->
    <div id="my-view" class="view-section" style="display:none;">
      <h2 class="mb-4">내 주차 예약 내역</h2>
      <div id="reservation-list" class="res-list">
        <!-- 예약 리스트 -->
      </div>
      <div class="mt-5 idor-box" data-bug-id="site022-bug03">
        <button id="test-idor-btn" class="btn-outline btn-sm">타인 예약 무단 조회 테스트 (Bug 03)</button>
      </div>
    </div>
  </main>

  <!-- 예약 모달 -->
  <div id="reserve-modal" class="modal">
    <div class="modal-content">
      <span class="close">&times;</span>
      <h2 id="modal-lot-name">주차장 예약</h2>
      <p id="modal-lot-addr" class="text-muted text-sm"></p>
      <form id="reserve-form" class="mt-4">
        <div class="form-group">
          <label>차량 번호</label>
          <input type="text" id="car-num" class="form-input" placeholder="12가 3456" required>
        </div>
        <div class="form-group mt-2">
          <label>예약 시간</label>
          <select id="reserve-time" class="form-input">
            <option value="1시간 (3,000원)">1시간</option>
            <option value="2시간 (6,000원)">2시간</option>
            <option value="종일권 (20,000원)">종일권</option>
          </select>
        </div>
        <button type="submit" id="submit-reserve-btn" class="btn-primary w-full mt-4" data-bug-id="site022-bug02">예약하기 (지연 발생)</button>
      </form>
    </div>
  </div>

  <div id="toast" class="toast">메시지</div>

  <script src="/js/app.js"></script>
</body>
</html>
