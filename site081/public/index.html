<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MakeupShelf — 나의 화장품 관리</title>
  <meta name="description" content="MakeupShelf: 화장품 사용기한을 관리하고 리뷰를 기록하세요. 위시리스트와 통계까지 한눈에." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

<!-- ── HEADER ── -->
<header class="site-header" id="top">
  <div class="header-inner">
    <a href="#" class="logo" id="logo-link">
      <span class="logo-emoji">💄</span>
      <span class="logo-text">Makeup<strong>Shelf</strong></span>
    </a>
    <nav class="main-nav" id="main-nav">
      <a href="#" class="nav-item active" data-view="products">내 화장품</a>
      <a href="#" class="nav-item" data-view="expiring">사용기한 임박</a>
      <a href="#" class="nav-item" data-view="wishlist">위시리스트</a>
      <a href="#" class="nav-item" data-view="stats">통계</a>
    </nav>
    <div class="header-actions">
      <div class="alert-bell" id="alert-bell" title="임박 알림">
        🔔<span class="bell-badge" id="bell-badge">0</span>
      </div>
      <button class="btn-icon-hdr" id="btn-hdr-refresh" title="새로고침">↻</button>
      <div class="user-chip">
        <span class="user-av">A</span>
        <span>user_alice</span>
      </div>
      <button class="nav-toggle" id="nav-toggle">☰</button>
    </div>
  </div>
</header>

<!-- ── MAIN ── -->
<main class="page-main">

  <!-- ══ VIEW: PRODUCTS ══ -->
  <section class="view active" id="view-products">
    <div class="view-container">

      <!-- Hero banner -->
      <div class="products-hero">
        <div class="hero-left">
          <div class="hero-pill">✨ 나만의 화장품 서랍</div>
          <h1 class="hero-title">스마트한<br/><span class="hero-accent">화장품 관리</span></h1>
          <p class="hero-sub">사용기한, 리뷰, 위시리스트를 한곳에서 관리하세요.</p>
        </div>
        <div class="hero-emojis" id="hero-emojis">💄🧴💋👁️☀️🌟</div>
      </div>

      <!-- Toolbar -->
      <div class="toolbar">
        <div class="search-box">
          <span>🔍</span>
          <input type="text" id="prod-search" class="search-inp" placeholder="제품명, 브랜드 검색..." />
        </div>
        <div class="filter-chips" id="brand-chips">
          <button class="fchip active" data-brand="all">전체</button>
        </div>
        <div class="filter-chips" id="cat-chips">
          <button class="fchip active" data-cat="all">전체</button>
        </div>
        <select class="sort-sel" id="prod-sort">
          <option value="">기본</option>
          <option value="expiry_asc">사용기한 빠른순</option>
          <option value="expiry_desc">사용기한 느린순</option>
          <option value="rating">평점 높은순</option>
          <option value="name">이름순</option>
        </select>
      </div>

      <div class="result-bar">
        <span id="prod-result-label">로딩 중...</span>
      </div>

      <div class="product-grid" id="product-grid"></div>
    </div>
  </section>

  <!-- ══ VIEW: EXPIRING ══ -->
  <section class="view" id="view-expiring">
    <div class="view-container">
      <div class="expiring-header">
        <h2 class="view-title">⏰ 사용기한 임박 제품</h2>
        <div class="days-filter">
          <label>이내</label>
          <select class="sort-sel" id="expiry-days-select">
            <option value="7">7일</option>
            <option value="14">14일</option>
            <option value="30" selected>30일</option>
            <option value="60">60일</option>
          </select>
        </div>
      </div>
      <div class="expiry-notice" id="expiry-notice"></div>
      <div class="expiring-list" id="expiring-list"></div>
    </div>
  </section>

  <!-- ══ VIEW: WISHLIST ══ -->
  <section class="view" id="view-wishlist">
    <div class="view-container">
      <div class="wishlist-header">
        <h2 class="view-title">❤️ 위시리스트</h2>
        <div class="idor-panel">
          <span class="idor-label">🔍 다른 사용자 위시리스트 조회 (보안 테스트)</span>
          <div class="idor-row">
            <input type="text" id="idor-user-input" placeholder="user_bob" class="idor-inp" />
            <button class="btn-idor" id="btn-idor-lookup">조회</button>
          </div>
          <div class="idor-result" id="idor-result"></div>
        </div>
      </div>
      <div class="wishlist-grid" id="wishlist-grid"></div>
    </div>
  </section>

  <!-- ══ VIEW: STATS ══ -->
  <section class="view" id="view-stats">
    <div class="view-container">
      <div class="stats-header">
        <h2 class="view-title">📊 나의 통계</h2>
        <button class="btn-refresh-stats" id="btn-refresh-stats">↻ 새로고침</button>
      </div>
      <div class="stats-grid" id="stats-grid"></div>
      <div class="stats-section">
        <h3 class="stats-sub-title">카테고리별 분포</h3>
        <div class="cat-bars" id="cat-bars"></div>
      </div>
      <div class="stats-section">
        <h3 class="stats-sub-title">브랜드별 보유 현황</h3>
        <div class="brand-table" id="brand-table"></div>
      </div>
    </div>
  </section>

</main>

<!-- ── MODAL: PRODUCT DETAIL ── -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal-box" id="modal-box">
    <button class="modal-close" id="modal-close">✕</button>

    <div class="modal-product-hero" id="modal-product-hero"></div>

    <div class="modal-tabs">
      <button class="mtab active" data-mtab="info">제품 정보</button>
      <button class="mtab" data-mtab="reviews">리뷰</button>
      <button class="mtab" data-mtab="manage">관리</button>
    </div>

    <div class="mtab-pane active" id="mtab-info">
      <div class="modal-info-grid" id="modal-info-grid"></div>
      <div class="modal-desc" id="modal-desc"></div>
    </div>

    <div class="mtab-pane hidden" id="mtab-reviews">
      <div class="review-list" id="modal-review-list"></div>
      <div class="review-form-wrap">
        <h4>리뷰 작성</h4>
        <form class="review-form" id="review-form">
          <input type="hidden" id="review-product-id" />
          <div class="rform-row">
            <input type="text" id="review-author" placeholder="닉네임" maxlength="20" required />
            <select id="review-rating">
              <option value="5">⭐⭐⭐⭐⭐</option>
              <option value="4">⭐⭐⭐⭐</option>
              <option value="3">⭐⭐⭐</option>
              <option value="2">⭐⭐</option>
              <option value="1">⭐</option>
            </select>
          </div>
          <textarea id="review-content" placeholder="사용 후기를 남겨주세요." rows="3" maxlength="200"></textarea>
          <button type="submit" class="btn-primary btn-sm">리뷰 등록</button>
        </form>
        <div class="review-msg" id="review-msg"></div>
      </div>
    </div>

    <div class="mtab-pane hidden" id="mtab-manage">
      <div class="manage-grid" id="manage-grid"></div>
      <div class="manage-actions">
        <button class="btn-wishlist-modal" id="btn-wishlist-modal">❤️ 위시리스트 추가/제거</button>
        <button class="btn-delete-modal" id="btn-delete-modal">🗑 선반에서 제거</button>
      </div>
      <div class="manage-msg" id="manage-msg"></div>
    </div>
  </div>
</div>

<!-- ── TOAST ── -->
<div class="toast" id="toast"></div>

<script src="/js/app.js"></script>
</body>
</html>
