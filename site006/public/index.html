<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MealBox Order</title>
  <link rel="stylesheet" href="/css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&family=Nanum+Gothic:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Header -->
  <header>
    <div class="header-inner">
      <h1 class="logo">MealBox <span class="text-orange">Fresh</span></h1>
      <nav>
        <button class="nav-btn active" id="nav-shop">도시락 주문</button>
        <button class="nav-btn" id="nav-delivery">배송/리뷰</button>
      </nav>
    </div>
  </header>

  <!-- Shop View -->
  <main id="shop-view">
    <div class="shop-grid">
      <!-- Left: Menus -->
      <div class="shop-main">
        <!-- Section 1: Recommendations -->
        <section class="mb-4">
          <div class="recommend-banner">
            <h2>🥗 MD 추천! 오늘의 프레시 박스</h2>
            <p>다이어터들을 위한 연어 포케 보울과 닭가슴살 샐러드</p>
          </div>
        </section>

        <!-- Section 2: Menu List -->
        <section class="menu-section">
          <div class="section-header">
            <h2>전체 메뉴</h2>
            <div class="filter-controls">
              <input type="text" id="menu-search" placeholder="메뉴명 검색">
              <select id="type-filter">
                <option value="전체">전체 카테고리</option>
                <option value="다이어트">다이어트</option>
                <option value="한식">든든한 한식</option>
              </select>
            </div>
          </div>
          <div class="menu-list" id="menu-list">
            <!-- Menus injected here -->
          </div>
        </section>
      </div>

      <!-- Right: Cart & Order -->
      <div class="shop-sidebar">
        <!-- Section 3: Cart -->
        <section class="card cart-section">
          <h2>장바구니 🛒</h2>
          <div id="cart-items" class="cart-items">
            <p class="text-muted text-center" style="padding:1rem 0;">장바구니가 비어있습니다.</p>
          </div>
          <div class="cart-total">
            <span>총 결제금액</span>
            <span id="cart-total-price" class="text-orange" style="font-weight:bold; font-size:1.2rem;">0원</span>
          </div>
        </section>

        <!-- Section 4: Order Info -->
        <section class="card order-section mt-4">
          <h2>주문하기</h2>
          <form id="order-form">
            <input type="text" id="order-address" placeholder="배송지 주소 (예: 서울시 강남구)" required>
            
            <div class="hack-panel mb-2">
              <label class="text-xs text-muted">결제 금액 변조 테스트 (Bug 03)</label>
              <input type="number" id="hack-price" placeholder="조작할 금액 입력">
            </div>

            <div style="display:flex; gap:10px;">
              <!-- Bug 02: Network retry duplicate button -->
              <button type="submit" class="btn-primary flex-1" id="submit-order-btn" data-bug-id="site006-bug01">결제하기</button>
              <button type="button" class="btn-outline" id="retry-order-btn" data-bug-id="site006-bug02" title="의도적 연타/재시도 모의">네트워크 재시도</button>
            </div>
          </form>
        </section>
      </div>
    </div>
  </main>

  <!-- Delivery & Review View -->
  <main id="delivery-view" style="display:none;">
    <div class="shop-grid">
      <div class="shop-main">
        <!-- Section 5: Delivery Status -->
        <section class="card mb-4">
          <div class="section-header">
            <h2>배송 현황</h2>
            <button class="btn-icon" id="refresh-orders-btn">↻ 새로고침</button>
          </div>
          <div class="order-list" id="order-list">
            <!-- Orders injected here -->
          </div>
        </section>
        
        <!-- Section 6: Reviews -->
        <section class="card">
          <h2>고객 리뷰</h2>
          <form id="review-form" class="mb-4">
            <div style="display:flex; gap:10px;">
              <select id="review-menu-id" required>
                <!-- Menus for review -->
              </select>
              <select id="review-rating" required style="width:100px;">
                <option value="5">⭐⭐⭐⭐⭐</option>
                <option value="4">⭐⭐⭐⭐</option>
                <option value="3">⭐⭐⭐</option>
              </select>
            </div>
            <textarea id="review-comment" placeholder="맛있게 드셨나요? 리뷰를 남겨주세요." required></textarea>
            <button type="submit" class="btn-primary mt-2">리뷰 등록</button>
          </form>
          <div class="review-list" id="review-list">
            <!-- Reviews injected here -->
          </div>
        </section>
      </div>
    </div>
  </main>

  <!-- Modal -->
  <div class="modal-overlay" id="menu-modal">
    <div class="modal-content">
      <button class="close-btn" id="close-modal">&times;</button>
      <div id="modal-body"></div>
    </div>
  </div>

  <div id="toast" class="toast">알림 메시지</div>

  <script src="/js/app.js"></script>
</body>
</html>
