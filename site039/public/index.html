<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SalonBook - 당신의 아름다움을 디자인합니다</title>
  <link rel="stylesheet" href="/css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app-layout">
    <nav class="top-nav">
      <div class="logo">Salon<span class="text-gold">Book</span></div>
      <div class="nav-links">
        <button id="nav-home" class="active">예약하기</button>
        <button id="nav-my">내 예약 확인</button>
        <button id="nav-reviews">스타일 리뷰</button>
      </div>
      <div class="user-info">
        <span>Premium Guest</span>
      </div>
    </nav>

    <main class="main-content">
      <!-- Booking Step 1: Stylist & Service -->
      <div id="step1-view" class="view-section">
        <div class="section-title">
          <h2>스타일리스트 선택</h2>
          <p class="text-muted">원하시는 디자이너를 선택해 주세요.</p>
        </div>
        <div id="stylist-grid" class="grid mt-4">
          <!-- 스타일리스트 카드 -->
        </div>

        <div class="section-title mt-5">
          <h2>시술 메뉴</h2>
        </div>
        <div id="service-list" class="service-list mt-4">
          <!-- 시술 목록 -->
        </div>
      </div>

      <!-- Booking Step 2: Date & Time -->
      <div id="step2-view" class="view-section" style="display:none;">
        <div class="section-title">
          <button id="back-to-step1" class="btn-back">← 뒤로가기</button>
          <h2 class="mt-2">예약 일정 선택</h2>
        </div>
        <div class="booking-config mt-4">
          <div class="config-card">
            <label>예약 희망일</label>
            <input type="date" id="booking-date" class="form-input mt-1" value="2024-05-20">
          </div>
          <div class="config-card mt-4">
            <label>예약 가능 시간</label>
            <div id="time-grid" class="time-grid mt-1" data-bug-id="site039-bug01">
              <!-- 시간 버튼 -->
            </div>
          </div>
        </div>
        <div class="booking-footer mt-5">
          <button id="place-booking-btn" class="btn-gold w-full" data-bug-id="site039-bug02">예약 신청하기</button>
        </div>
      </div>

      <!-- My Bookings View -->
      <div id="my-view" class="view-section" style="display:none;">
        <h2 class="mb-4">나의 예약 현황</h2>
        <div id="booking-list" class="booking-list">
          <!-- 예약 리스트 -->
        </div>
      </div>
    </main>

    <!-- 예약 상세 모달 -->
    <div id="detail-modal" class="modal">
      <div class="modal-content">
        <span class="close">&times;</span>
        <div id="modal-body" data-bug-id="site039-bug03">
          <!-- 동적 로드 -->
        </div>
      </div>
    </div>
  </div>

  <div id="toast" class="toast">메시지</div>

  <script src="/js/app.js"></script>
</body>
</html>
