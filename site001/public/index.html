<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Campus Market</title>
  <link rel="stylesheet" href="/css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Header -->
  <header>
    <div class="header-container">
      <h1 class="logo">Campus Market</h1>
      <nav>
        <button id="nav-home">홈</button>
        <button id="nav-mypage">마이페이지</button>
        <button id="nav-login" class="primary-btn">로그인</button>
      </nav>
    </div>
  </header>

  <main>
    <!-- Section 1: Main Hero -->
    <section class="hero-section" id="section-hero">
      <div class="hero-content">
        <h2>캠퍼스 라이프의 시작,<br><span class="highlight">캠퍼스 마켓</span>과 함께</h2>
        <p>우리 학교 학생들과 안전하게 거래하세요.</p>
        <div class="search-box">
          <input type="text" id="search-input" placeholder="어떤 물건을 찾으시나요?">
          <button id="search-btn">검색</button>
        </div>
      </div>
    </section>

    <!-- Section 2: Categories -->
    <section class="category-section" id="section-categories">
      <h3>인기 카테고리</h3>
      <div class="category-list">
        <!-- data-bug-id attached here for the category bug -->
        <button class="cat-btn active" data-category="전체" data-bug-id="site001-bug01">전체</button>
        <button class="cat-btn" data-category="도서" data-bug-id="site001-bug01">도서</button>
        <button class="cat-btn" data-category="전자기기" data-bug-id="site001-bug01">전자기기</button>
        <button class="cat-btn" data-category="가구" data-bug-id="site001-bug01">가구</button>
      </div>
      <div class="sort-controls">
        <select id="sort-select">
          <option value="default">기본순</option>
          <option value="priceAsc">가격 낮은순</option>
          <option value="priceDesc">가격 높은순</option>
        </select>
        <button id="refresh-btn">새로고침</button>
      </div>
    </section>

    <!-- Section 3: Popular Products -->
    <section class="products-section" id="section-products">
      <div class="product-grid" id="product-container">
        <!-- Products will be injected here -->
      </div>
    </section>

    <!-- Section 4: Transaction Reviews -->
    <section class="reviews-section" id="section-reviews">
      <h3>생생한 거래 후기</h3>
      <div class="review-tabs">
        <button class="tab-btn active" data-tab="latest">최신순</button>
        <button class="tab-btn" data-tab="best">베스트순</button>
      </div>
      <div class="review-list" id="review-container">
        <!-- Mock reviews -->
        <div class="review-card">
          <p class="review-text">"물건 상태가 너무 좋아요!"</p>
          <span class="review-author">- 익명1</span>
        </div>
        <div class="review-card">
          <p class="review-text">"직거래 시간에 늦으셔서 조금 아쉬웠습니다."</p>
          <span class="review-author">- 익명2</span>
        </div>
      </div>
    </section>

    <!-- Section 5: Sell Form -->
    <section class="sell-section" id="section-sell">
      <h3>내 물건 팔기</h3>
      <form id="sell-form">
        <input type="text" id="sell-title" placeholder="상품명" required>
        <input type="number" id="sell-price" placeholder="가격 (원)" required>
        <select id="sell-category" required>
          <option value="">카테고리 선택</option>
          <option value="도서">도서</option>
          <option value="전자기기">전자기기</option>
          <option value="가구">가구</option>
        </select>
        <textarea id="sell-desc" placeholder="상품에 대한 상세한 설명을 적어주세요." required></textarea>
        <button type="submit" class="primary-btn">등록하기</button>
      </form>
    </section>

    <!-- Section 6: My Page (Hidden by default) -->
    <section class="mypage-section" id="section-mypage" style="display: none;">
      <h3 data-bug-id="site001-bug03">마이페이지</h3>
      <div class="mypage-card" id="mypage-content">
        <p>로그인이 필요합니다.</p>
      </div>
      <!-- Bypass login test button for bug 3 -->
      <button id="bypass-login-btn" class="secondary-btn" style="margin-top: 10px;">(개발자용) 로그인 없이 마이페이지 접근 테스트</button>
    </section>
  </main>

  <!-- Modals -->
  <div class="modal-overlay" id="product-modal">
    <div class="modal-content">
      <button class="close-btn" id="close-modal">&times;</button>
      <div id="modal-body">
        <!-- Product detail injected here -->
      </div>
      <button class="primary-btn" id="modal-fav-btn" data-bug-id="site001-bug02">관심 상품 저장</button>
    </div>
  </div>

  <div class="notification" id="notification">알림 메시지</div>

  <script src="/js/app.js"></script>
</body>
</html>
