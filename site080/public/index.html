<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RoomMate Board — 내 취향의 룸메이트 찾기</title>
  <meta name="description" content="RoomMate Board: 지역, 성별, 생활 패턴 조건으로 나에게 맞는 룸메이트를 쉽게 찾아보세요." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

<!-- ── HEADER ── -->
<header class="site-header" id="top">
  <div class="header-inner">
    <a href="#" class="logo" id="logo-home">
      <span class="logo-icon">🏠</span>
      <span class="logo-text">RoomMate<strong>Board</strong></span>
    </a>
    <nav class="main-nav" id="main-nav">
      <a href="#" class="nav-link" data-tab="board">게시판</a>
      <a href="#" class="nav-link" data-tab="write">글쓰기</a>
      <a href="#" class="nav-link" data-tab="my">내 게시글</a>
      <a href="#" class="nav-link" data-tab="messages">메시지</a>
    </nav>
    <div class="header-right">
      <button class="btn-refresh-header" id="btn-refresh-header" title="새로고침">↻</button>
      <div class="header-user" id="header-user">
        <span class="avatar-sm">K</span>
        <span>user_kim</span>
      </div>
      <button class="mobile-toggle" id="mobile-toggle">☰</button>
    </div>
  </div>
</header>

<!-- ── MAIN ── -->
<main class="main-wrap">

  <!-- ══ TAB: BOARD ══ -->
  <section class="tab-section active" id="tab-board">

    <!-- Hero -->
    <div class="board-hero">
      <div class="hero-text">
        <h1>딱 맞는 룸메이트를<br/><span class="accent">지금 찾아보세요</span></h1>
        <p>지역, 성별, 생활 패턴으로 나에게 맞는 룸메이트를 스마트하게 매칭합니다.</p>
      </div>
      <div class="hero-search-box">
        <div class="search-row">
          <span class="si">🔍</span>
          <input type="text" id="search-input" placeholder="지역, 키워드, 태그 검색..." class="search-input" />
          <button class="btn-search" id="btn-search">검색</button>
        </div>
      </div>
    </div>

    <!-- Filter Bar -->
    <div class="filter-bar" id="filter-bar">
      <div class="filter-inner">
        <!-- Region chips -->
        <div class="filter-group">
          <label class="filter-label">지역</label>
          <div class="chip-row" id="region-chips">
            <button class="fchip active" data-region="all">전체</button>
          </div>
        </div>
        <!-- Gender -->
        <div class="filter-group">
          <label class="filter-label">성별</label>
          <select class="fselect" id="filter-gender">
            <option value="all">전체</option>
            <option value="여성">여성</option>
            <option value="남성">남성</option>
            <option value="무관">무관</option>
          </select>
        </div>
        <!-- Room type -->
        <div class="filter-group">
          <label class="filter-label">방 유형</label>
          <select class="fselect" id="filter-roomtype">
            <option value="all">전체</option>
            <option value="원룸 쉐어">원룸 쉐어</option>
            <option value="2인실">2인실</option>
            <option value="쉐어하우스">쉐어하우스</option>
          </select>
        </div>
        <!-- Sort -->
        <div class="filter-group">
          <label class="filter-label">정렬</label>
          <select class="fselect" id="sort-select">
            <option value="recent">최신순</option>
            <option value="views">조회순</option>
            <option value="rent_asc">월세 낮은순</option>
            <option value="rent_desc">월세 높은순</option>
          </select>
        </div>
        <!-- Status notice -->
        <div class="filter-group">
          <label class="filter-label">상태</label>
          <div class="status-indicator" id="status-indicator">
            <span class="sdot open"></span><span id="status-label">로딩중...</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Post List -->
    <div class="board-content">
      <div class="board-result-row">
        <span class="result-label" id="result-label">게시글 로딩 중...</span>
      </div>
      <div class="post-grid" id="post-grid"></div>
    </div>

  </section>

  <!-- ══ TAB: WRITE ══ -->
  <section class="tab-section" id="tab-write">
    <div class="write-wrap">
      <h2 class="section-title">✏️ 룸메이트 모집 글 작성</h2>
      <form class="write-form" id="write-form" novalidate>
        <div class="form-grid">
          <div class="form-field full">
            <label>제목 *</label>
            <input type="text" id="f-title" placeholder="제목을 입력하세요" required maxlength="60" />
          </div>
          <div class="form-field">
            <label>지역 *</label>
            <select id="f-region">
              <option value="">선택</option>
              <option>강남</option><option>홍대</option><option>신촌</option>
              <option>이태원</option><option>건대</option><option>성수</option><option>기타</option>
            </select>
          </div>
          <div class="form-field">
            <label>상세 주소</label>
            <input type="text" id="f-district" placeholder="예: 강남구 역삼동" maxlength="40" />
          </div>
          <div class="form-field">
            <label>월세 (원) *</label>
            <input type="number" id="f-rent" placeholder="예: 550000" min="0" />
          </div>
          <div class="form-field">
            <label>보증금 (원)</label>
            <input type="number" id="f-deposit" placeholder="예: 1000000" min="0" />
          </div>
          <div class="form-field">
            <label>방 유형</label>
            <select id="f-roomtype">
              <option>원룸 쉐어</option><option>2인실</option><option>쉐어하우스</option>
            </select>
          </div>
          <div class="form-field">
            <label>성별</label>
            <select id="f-gender">
              <option>무관</option><option>여성</option><option>남성</option>
            </select>
          </div>
          <div class="form-field">
            <label>입주 가능일</label>
            <input type="date" id="f-movein" />
          </div>
          <div class="form-field">
            <label>기간</label>
            <input type="text" id="f-duration" placeholder="예: 6개월 이상" maxlength="20" />
          </div>
          <div class="form-field full">
            <label>소개</label>
            <textarea id="f-desc" placeholder="생활 패턴, 원하는 룸메이트 성향 등을 자유롭게 적어주세요." rows="4" maxlength="500"></textarea>
          </div>
          <div class="form-field full">
            <label>태그 (쉼표 구분)</label>
            <input type="text" id="f-tags" placeholder="예: 조용함, 청결, 직장인" />
          </div>
        </div>
        <div class="form-actions">
          <button type="submit" class="btn-primary" id="btn-write-submit">게시글 등록</button>
          <button type="button" class="btn-secondary" id="btn-write-cancel">취소</button>
        </div>
        <div class="form-msg" id="form-msg"></div>
      </form>
    </div>
  </section>

  <!-- ══ TAB: MY POSTS ══ -->
  <section class="tab-section" id="tab-my">
    <div class="my-wrap">
      <h2 class="section-title">📌 내 게시글</h2>
      <div class="my-post-list" id="my-post-list"></div>
      <h2 class="section-title" style="margin-top:36px">📋 받은 신청</h2>
      <div class="my-app-list" id="my-app-list"></div>
    </div>
  </section>

  <!-- ══ TAB: MESSAGES ══ -->
  <section class="tab-section" id="tab-messages">
    <div class="messages-wrap">
      <div class="msg-sidebar">
        <h3 class="msg-sidebar-title">💬 메시지</h3>
        <div class="thread-list" id="thread-list"></div>
        <div class="msg-debug">
          <label class="debug-label">🔍 스레드 ID 직접 조회 (IDOR 테스트)</label>
          <div class="debug-row">
            <input type="text" id="debug-thread-input" placeholder="thread_4_X" class="debug-input" />
            <button class="btn-debug" id="btn-debug-lookup">조회</button>
          </div>
          <div class="debug-result" id="debug-result"></div>
        </div>
      </div>
      <div class="msg-main" id="msg-main">
        <div class="msg-placeholder">💬 대화를 선택하세요</div>
      </div>
    </div>
  </section>

</main>

<!-- ── MODAL: POST DETAIL ── -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal-box" id="modal-box">
    <button class="modal-close" id="modal-close">✕</button>

    <div class="modal-post-header" id="modal-post-header"></div>

    <div class="modal-tabs">
      <button class="mtab active" data-mtab="detail">상세정보</button>
      <button class="mtab" data-mtab="lifestyle">생활패턴</button>
      <button class="mtab" data-mtab="apply">신청하기</button>
    </div>

    <!-- Detail tab -->
    <div class="mtab-pane active" id="mtab-detail">
      <div class="modal-detail-grid" id="modal-detail-grid"></div>
      <div class="modal-desc" id="modal-desc"></div>
      <div class="modal-tags" id="modal-tags"></div>
    </div>

    <!-- Lifestyle tab -->
    <div class="mtab-pane hidden" id="mtab-lifestyle">
      <div class="lifestyle-grid" id="lifestyle-grid"></div>
    </div>

    <!-- Apply tab -->
    <div class="mtab-pane hidden" id="mtab-apply">
      <div class="apply-notice" id="apply-notice"></div>
      <form class="apply-form" id="apply-form" novalidate>
        <input type="hidden" id="apply-post-id" />
        <label>신청 메시지 *</label>
        <textarea id="apply-message" placeholder="자기소개와 입주 가능 날짜를 작성해주세요." rows="4" maxlength="300"></textarea>
        <button type="submit" class="btn-primary" id="btn-apply-submit">신청 보내기</button>
        <div class="apply-msg" id="apply-msg"></div>
      </form>
    </div>
  </div>
</div>

<!-- ── TOAST ── -->
<div class="toast" id="toast"></div>

<script src="/js/app.js"></script>
</body>
</html>
