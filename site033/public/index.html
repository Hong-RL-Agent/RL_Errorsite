<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OfficeSupply Mall - 기업용 사무용품 전문</title>
  <link rel="stylesheet" href="/css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app-container">
    <aside class="sidebar">
      <div class="logo">Office<span class="text-blue">Supply</span></div>
      <nav class="nav-menu">
        <button id="nav-mall" class="active">🛍️ 쇼핑몰</button>
        <button id="nav-cart">🛒 장바구니 <span id="cart-count" class="badge">0</span></button>
        <button id="nav-quotes">📄 견적서 관리</button>
        <button id="nav-orders">📦 주문 내역</button>
      </nav>
      <div class="sidebar-footer">
        <p class="text-xs">B2B 전용 고객센터<br>1588-0000</p>
      </div>
    </aside>

    <main class="main-content">
      <header class="top-bar">
        <div class="search-area">
          <input type="text" id="product-search" placeholder="상품명 또는 카테고리 검색...">
        </div>
        <div class="user-info">
          <span class="user-name">GlobalTech Inc.</span>
        </div>
      </header>

      <!-- Mall View -->
      <div id="mall-view" class="view-section">
        <div class="section-header">
          <h2>상품 목록</h2>
          <div class="filters">
            <select id="cat-filter">
              <option value="all">전체 카테고리</option>
              <option value="Paper">복사용지</option>
              <option value="Writing">필기류</option>
              <option value="Furniture">사무가구</option>
              <option value="Tech">사무기기</option>
            </select>
          </div>
        </div>
        <div id="product-grid" class="grid mt-4">
          <!-- 상품 카드 -->
        </div>
      </div>

      <!-- Cart View -->
      <div id="cart-view" class="view-section" style="display:none;">
        <h2 class="mb-4">장바구니</h2>
        <div id="cart-items" class="cart-table-wrapper">
          <table class="cart-table">
            <thead>
              <tr>
                <th>상품명</th>
                <th>단가</th>
                <th>수량</th>
                <th>금액</th>
                <th>삭제</th>
              </tr>
            </thead>
            <tbody id="cart-body">
              <!-- 장바구니 내역 -->
            </tbody>
          </table>
        </div>
        <div class="cart-summary mt-5">
          <div class="summary-row">
            <span>총 상품 금액</span>
            <span id="cart-total">0원</span>
          </div>
          <div class="summary-actions mt-4">
            <button id="create-quote-btn" class="btn-outline">대량 주문 견적 받기</button>
            <button id="place-order-btn" class="btn-primary" data-bug-id="site033-bug01">최종 주문하기</button>
          </div>
        </div>
      </div>

      <!-- Quotes View -->
      <div id="quotes-view" class="view-section" style="display:none;">
        <h2 class="mb-4">발행된 견적서</h2>
        <div id="quote-list" class="grid">
          <p class="text-muted">발행된 견적서가 없습니다.</p>
        </div>
      </div>
    </main>

    <!-- 상품 상세 모달 -->
    <div id="product-modal" class="modal">
      <div class="modal-content">
        <span class="close">&times;</span>
        <div id="modal-body">
          <!-- 동적 로드 -->
        </div>
        <div class="modal-footer mt-4">
          <div class="qty-control">
            <button class="qty-btn" id="qty-minus">-</button>
            <input type="number" id="modal-qty" value="1" min="1">
            <button class="qty-btn" id="qty-plus">+</button>
          </div>
          <button id="add-to-cart-btn" class="btn-primary">장바구니 담기</button>
        </div>
      </div>
    </div>
  </div>

  <div id="toast" class="toast">메시지</div>

  <script src="/js/app.js"></script>
</body>
</html>
