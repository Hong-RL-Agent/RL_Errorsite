<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cafe Queue</title>
  <link rel="stylesheet" href="/css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="mobile-frame">
    <header>
      <h1>Cafe <span class="text-accent">Queue</span></h1>
      <div class="user-info">
        <span id="user-name">홍길동님</span>
        <div class="points" data-bug-id="site012-bug03">
          P <span id="user-points">0</span>
        </div>
      </div>
    </header>

    <nav class="tab-menu">
      <button id="nav-menu" class="active">메뉴</button>
      <button id="nav-queue">대기열</button>
      <button id="nav-status">주문상태</button>
    </nav>

    <main>
      <!-- 메뉴 뷰 -->
      <div id="menu-view">
        <div class="section-header">
          <h2>오늘의 추천</h2>
        </div>
        <div id="recommend-list" class="recommend-scroll">
          <!-- 추천 메뉴 -->
        </div>

        <div class="section-header mt-4">
          <h2>전체 메뉴</h2>
          <select id="category-filter">
            <option value="all">전체</option>
            <option value="Coffee">커피</option>
            <option value="Ade">에이드</option>
            <option value="Smoothie">스무디</option>
          </select>
        </div>
        <div id="menu-list" class="menu-grid">
          <!-- 메뉴 리스트 -->
        </div>
      </div>

      <!-- 대기열 뷰 -->
      <div id="queue-view" style="display:none;">
        <div class="section-header">
          <h2>주문 대기열</h2>
          <button id="refresh-queue" class="btn-icon">↻</button>
        </div>
        <div id="queue-list" class="queue-container">
          <!-- 대기열 리스트 -->
        </div>
      </div>

      <!-- 주문상태 뷰 -->
      <div id="status-view" style="display:none;">
        <h2>내 주문 상태</h2>
        <div id="my-order-status" class="status-card">
          <p class="text-muted">현재 진행 중인 주문이 없습니다.</p>
        </div>
      </div>
    </main>

    <!-- 하단 장바구니 바 -->
    <div id="cart-bar" class="cart-bar">
      <div class="cart-info">
        <span id="cart-count">0</span>건 선택됨
        <strong id="cart-total">0원</strong>
      </div>
      <button id="order-btn" class="btn-order" data-bug-id="site012-bug01 site012-bug02">주문하기</button>
    </div>
  </div>

  <!-- 메뉴 상세 모달 -->
  <div id="menu-modal" class="modal">
    <div class="modal-content">
      <span class="close">&times;</span>
      <div id="modal-body">
        <img id="modal-img" src="" alt="">
        <div class="modal-info">
          <h2 id="modal-name">메뉴 이름</h2>
          <p id="modal-price" class="text-accent">0원</p>
          
          <div class="options">
            <div class="option-group">
              <label>온도</label>
              <div class="radio-group">
                <button class="option-btn active" data-val="ICE">ICE</button>
                <button class="option-btn" data-val="HOT">HOT</button>
              </div>
            </div>
            <div class="option-group mt-2">
              <label>수량</label>
              <div class="qty-control">
                <button id="qty-minus">-</button>
                <span id="qty-val">1</span>
                <button id="qty-plus">+</button>
              </div>
            </div>
          </div>
          
          <button id="add-to-cart" class="btn-primary w-full mt-4">장바구니 담기</button>
        </div>
      </div>
    </div>
  </div>

  <div id="toast" class="toast">메시지</div>

  <script src="/js/app.js"></script>
</body>
</html>
