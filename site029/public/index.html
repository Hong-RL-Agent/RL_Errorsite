<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BikeShare Map - 서울 공유 자전거 현황</title>
  <link rel="stylesheet" href="/css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="sidebar">
    <div class="logo">Bike<span class="text-green">Share</span></div>
    <nav>
      <button id="nav-map" class="active">대여소 찾기</button>
      <button id="nav-fav">즐겨찾기</button>
      <button id="nav-history">이용 내역</button>
      <button id="nav-info">이용권 안내</button>
    </nav>
    <div class="sidebar-footer">
      <p class="text-xs">© 2024 BikeShare Map</p>
    </div>
  </div>

  <main class="content">
    <header class="top-bar">
      <div class="search-box">
        <input type="text" id="station-search" placeholder="대여소 이름 또는 지역 검색...">
        <button id="search-btn">검색</button>
      </div>
      <div class="user-profile">
        <span class="user-badge">Guest</span>
      </div>
    </header>

    <!-- Map/Finder View -->
    <div id="map-view" class="view-section">
      <div class="map-placeholder">
        <div class="map-overlay">
          <p>📍 주변 대여소를 확인하세요</p>
        </div>
      </div>

      <div class="station-list-panel">
        <div class="panel-header">
          <h3>주변 대여소 현황</h3>
          <div class="sort-options">
            <button class="sort-btn active" data-sort="default">거리순</button>
            <button class="sort-btn" data-sort="bikes">자전거순</button>
          </div>
        </div>
        <div id="station-grid" class="grid mt-3">
          <!-- 대여소 카드 -->
        </div>
      </div>
    </div>

    <!-- Favorites View -->
    <div id="fav-view" class="view-section" style="display:none;">
      <h2 class="mb-4">자주 찾는 대여소</h2>
      <div id="fav-grid" class="grid">
        <p class="text-muted">등록된 즐겨찾기가 없습니다.</p>
      </div>
    </div>

    <!-- History View -->
    <div id="history-view" class="view-section" style="display:none;">
      <h2 class="mb-4">나의 이용 내역</h2>
      <div id="history-list" class="history-list">
        <!-- 기록 리스트 -->
      </div>
    </div>
  </main>

  <!-- 대여소 상세 모달 -->
  <div id="station-modal" class="modal">
    <div class="modal-content">
      <span class="close">&times;</span>
      <div id="modal-body">
        <!-- 동적 로드 -->
        <p>대여소 정보를 불러오는 중...</p>
      </div>
      <div class="modal-footer mt-4">
        <button id="rent-bike-btn" class="btn-primary w-full" data-bug-id="site029-bug03">자전거 대여하기</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast">메시지</div>

  <script src="/js/app.js"></script>
</body>
</html>
