<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TodoSprint - 팀의 속도를 높이세요</title>
  <link rel="stylesheet" href="/css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar">
      <div class="logo">Todo<span class="text-blue">Sprint</span></div>
      <nav class="side-nav mt-5">
        <button id="nav-all" class="active">모든 할 일</button>
        <div class="nav-label mt-4">프로젝트</div>
        <div id="project-list">
          <!-- 프로젝트 리스트 -->
          <button class="proj-btn" data-id="proj-1">UI 리뉴얼</button>
          <button class="proj-btn" data-id="proj-2">백엔드 최적화</button>
        </div>
      </nav>
    </aside>

    <main class="content-area">
      <header class="top-header">
        <h1 id="view-title">모든 할 일</h1>
        <div class="user-info">
          <span class="avatar">JS</span>
          <span class="username">정스프린트</span>
        </div>
      </header>

      <div class="toolbar mt-4">
        <div class="search-box">
          <input type="text" id="task-search" placeholder="할 일 제목 또는 담당자 검색...">
        </div>
        <div class="board-tabs">
          <button class="view-tab active">리스트</button>
          <button class="view-tab">칸반</button>
        </div>
      </div>

      <div id="task-board" class="kanban-grid mt-4">
        <div class="kanban-col">
          <div class="col-header">할 일 (Todo)</div>
          <div id="col-todo" class="task-list"></div>
        </div>
        <div class="kanban-col">
          <div class="col-header">진행 중 (Doing)</div>
          <div id="col-doing" class="task-list"></div>
        </div>
        <div class="kanban-col">
          <div class="col-header">완료 (Done)</div>
          <div id="col-done" class="task-list"></div>
        </div>
      </div>
    </main>

    <!-- 할 일 상세 모달 -->
    <div id="task-modal" class="modal">
      <div class="modal-content">
        <span class="close">&times;</span>
        <div id="modal-body">
          <!-- 동적 로드 -->
        </div>
        <div class="modal-footer mt-5">
          <label>상태 변경</label>
          <div class="status-buttons mt-2" data-bug-id="site049-bug02">
            <button class="status-btn" data-status="Todo">Todo</button>
            <button class="status-btn" data-status="Doing">Doing</button>
            <button class="status-btn" data-status="Done">Done</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="toast" class="toast">메시지</div>

  <script src="/js/app.js"></script>
</body>
</html>
