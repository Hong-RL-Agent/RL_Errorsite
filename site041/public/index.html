<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BabyCare Log - 우리 아이 성장 일기</title>
  <link rel="stylesheet" href="/css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app-layout">
    <header class="navbar">
      <div class="logo">BabyCare<span class="text-pink">Log</span></div>
      <nav class="nav-links">
        <button id="nav-home" class="active">기록</button>
        <button id="nav-growth">성장</button>
        <button id="nav-history">달력</button>
        <button id="nav-share">공유</button>
      </nav>
      <div class="baby-profile">
        <div class="baby-info">
          <strong>튼튼이</strong>
          <p>D+125</p>
        </div>
      </div>
    </header>

    <main class="container">
      <!-- Recording View -->
      <div id="home-view" class="view-section">
        <div class="quick-stats">
          <div class="stat-card pink">
            <span class="label">마지막 수유</span>
            <span class="value">08:00 (120ml)</span>
          </div>
          <div class="stat-card blue">
            <span class="label">마지막 수면</span>
            <span class="value">10시간 전</span>
          </div>
        </div>

        <div class="section-header mt-5">
          <h2>오늘의 육아 일지</h2>
          <div class="date-picker">
            <input type="date" id="log-date-filter" value="2024-05-02">
          </div>
        </div>

        <div id="feeding-list" class="list-wrapper mt-4" data-bug-id="site041-bug01">
          <!-- 수유 기록 리스트 -->
        </div>

        <div class="action-fab">
          <button id="add-feeding-btn" class="btn-pink">+ 수유 기록</button>
        </div>
      </div>

      <!-- Growth View -->
      <div id="growth-view" class="view-section" style="display:none;">
        <h2 class="mb-4">성장 지표</h2>
        <div id="growth-card" class="card-puffy" data-bug-id="site041-bug02">
          <!-- 성장 데이터 -->
        </div>
      </div>

      <!-- Share View -->
      <div id="share-view" class="view-section" style="display:none;">
        <h2 class="mb-4">보호자 공유 기록</h2>
        <div class="toolbar mb-4">
          <select id="guardian-selector" class="form-input">
            <option value="mom_1">본인 (엄마)</option>
            <option value="dad_1">아빠</option>
            <option value="grandma_1">할머니</option>
          </select>
        </div>
        <div id="shared-list" class="list-wrapper" data-bug-id="site041-bug03">
          <!-- 공유된 기록 -->
        </div>
      </div>
    </main>

    <!-- 기록 추가 모달 -->
    <div id="record-modal" class="modal">
      <div class="modal-content">
        <span class="close">&times;</span>
        <h2>수유 기록 추가</h2>
        <form id="feeding-form" class="mt-4">
          <div class="form-group">
            <label>수유 유형</label>
            <select id="feed-type" class="form-input">
              <option value="Formula">분유</option>
              <option value="Breast Milk">모유</option>
              <option value="Baby Food">이유식</option>
            </select>
          </div>
          <div class="form-group mt-3">
            <label>수유량 (ml)</label>
            <input type="number" id="feed-amount" class="form-input" placeholder="예: 120" required>
          </div>
          <div class="form-group mt-3">
            <label>시간</label>
            <input type="time" id="feed-time" class="form-input" value="12:00" required>
          </div>
          <button type="submit" class="btn-pink w-full mt-5">기록 저장</button>
        </form>
      </div>
    </div>
  </div>

  <div id="toast" class="toast">메시지</div>

  <script src="/js/app.js"></script>
</body>
</html>
