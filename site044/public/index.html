<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DailyPoll - 당신의 목소리를 들려주세요</title>
  <link rel="stylesheet" href="/css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app-layout">
    <header class="navbar">
      <div class="logo">Daily<span class="text-indigo">Poll</span></div>
      <nav class="nav-links">
        <button id="nav-home" class="active">오늘의 설문</button>
        <button id="nav-my">참여 내역</button>
        <button id="nav-create">설문 만들기</button>
      </nav>
      <div class="user-info">
        <span class="status-online"></span>
        <span class="username">Active User</span>
      </div>
    </header>

    <main class="container">
      <!-- Home View -->
      <div id="home-view" class="view-section">
        <div class="hero">
          <h1>인기 설문조사</h1>
          <p>세상의 다양한 생각들을 투표로 확인해 보세요.</p>
        </div>

        <div class="toolbar mt-5">
          <div class="search-box">
            <input type="text" id="poll-search" placeholder="설문 주제 검색...">
          </div>
          <div class="category-filter">
            <button class="cat-btn active" data-cat="all">전체</button>
            <button class="cat-btn" data-cat="IT">IT</button>
            <button class="cat-btn" data-cat="Life">일상</button>
            <button class="cat-btn" data-cat="Health">건강</button>
          </div>
        </div>

        <div id="poll-grid" class="grid mt-4">
          <!-- 설문 카드 -->
        </div>
      </div>

      <!-- My Votes View -->
      <div id="my-view" class="view-section" style="display:none;">
        <h2 class="mb-4">나의 투표 참여 내역</h2>
        <div id="my-vote-list" class="list-wrapper">
          <!-- 참여 내역 -->
        </div>
      </div>
    </main>

    <!-- 설문 투표 및 결과 모달 -->
    <div id="poll-modal" class="modal">
      <div class="modal-content">
        <span class="close">&times;</span>
        <div id="modal-body">
          <!-- 동적 로드 -->
        </div>
        <div id="modal-footer" class="mt-5">
          <div class="vote-actions" id="vote-btn-group">
            <button id="submit-vote-btn" class="btn-indigo w-full" data-bug-id="site044-bug01">투표하기</button>
          </div>
          <div class="result-actions" id="result-btn-group" style="display:none;">
            <button id="back-to-vote" class="btn-outline w-full">다시 투표 (수정)</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="toast" class="toast">메시지</div>

  <script src="/js/app.js"></script>
</body>
</html>
